name: Continuous Integration Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    # paths:
    #     - '!**'
    #     - thp-benchmark.sh
    #     - thp-always.service.d/thp-always.sh
    #     - .github/workflows/ci.yml
  pull_request:
    branches: [ master ]
    # paths:
    #     - '!**'
    #     - thp-benchmark.sh
    #     - thp-always.service.d/thp-always.sh
    #     - .github/workflows/ci.yml

jobs:
  unit-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Install Ubuntu packages
      run: |
        sudo apt-get update --yes
        sudo apt-get install --yes coreutils sed stress-ng icdiff

    - name: Run THP benchmark
      run: ./thp-benchmark.sh
